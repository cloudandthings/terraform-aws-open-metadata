name: Bug Report
description: Report a bug or unexpected behavior
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      render: hcl
      placeholder: |
        module "example" {
          source = "..."
        }
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: Module version / Terraform or OpenTofu version
      placeholder: "e.g., v1.2.0 / tofu 1.8.8"
    validations:
      required: true
